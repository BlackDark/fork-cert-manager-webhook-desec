apiVersion: v1
kind: Service
metadata:
  name: {{ include "desec-webhook.fullname" . }}
  labels:
{{ include "desec-webhook.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
      name: https
  selector:
{{ include "desec-webhook.matchLabels" . | indent 4 }}
