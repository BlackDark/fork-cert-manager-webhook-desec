name: release-helm-chart

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      chart_version:
        description: "Chart version (required when running manually)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  CHART_DIR: deploy/desec-webhook

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Normalize repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Resolve chart version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.chart_version }}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "::error::Unable to resolve chart version. Provide workflow_dispatch input 'chart_version'."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: helm lint "${{ env.CHART_DIR }}"

      - name: Package chart
        id: package
        shell: bash
        run: |
          mkdir -p .chart-packages
          helm package "${{ env.CHART_DIR }}" \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination .chart-packages
          CHART_PACKAGE="$(ls .chart-packages/*.tgz | head -n 1)"
          echo "path=$CHART_PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Push chart to GHCR
        run: |
          helm push "${{ steps.package.outputs.path }}" "oci://ghcr.io/${{ env.OWNER_LC }}/charts"
